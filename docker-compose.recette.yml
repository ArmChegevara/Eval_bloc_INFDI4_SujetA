services:
  web:
    build: .
    container_name: videgrenier_web_recette
    ports:
      - "8092:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: videgrenier_db_recette
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: videgrenier
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - db_data_recette:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  db_data_recette: