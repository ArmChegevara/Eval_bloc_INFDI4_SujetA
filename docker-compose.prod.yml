services:
  web:
    build: .
    container_name: videgrenier_web_prod
    ports:
      - "8093:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: videgrenier_db_prod
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: videgrenier
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: videgrenier_phpmyadmin_prod
    restart: always
    ports:
      - "8099:80"
    environment:
      PMA_HOST: db
      PMA_USER: user
      PMA_PASSWORD: password
    depends_on:
      - db

volumes:
  db_data_prod: